<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Site - Core PMC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <link href="static/css/create-site.css" rel="stylesheet">
</head>
<body>

    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <div class="logo-container me-3">
                    <div class="logo-text"><span class="core-text">CORE</span><span class="pmc-text">PMC</span></div>
                    <div class="tagline">INTEGRITY | TRANSPARENCY | HONESTY</div>
                </div>
            </a>
            <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-controls="sidebar"><span class="navbar-toggler-icon"></span></button>
            <div class="navbar-nav ms-auto">
                <div class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"><i class="fas fa-user-circle me-1"></i> Admin</a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="fas fa-user me-2"></i>Profile</a></li>
                        <li><a class="dropdown-item" href="#"><i class="fas fa-cog me-2"></i>Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="index.html"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="offcanvas-lg offcanvas-start bg-primary text-white" id="sidebar" data-bs-scroll="true" data-bs-backdrop="false">
        <div class="offcanvas-header d-lg-none"><h5 class="offcanvas-title">Menu</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebar"></button></div>
        <div class="offcanvas-body p-0">
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">PROJECTS</div>
                    <ul class="nav nav-pills flex-column">
                        <li class="nav-item"><a class="nav-link" href="dashboard.html"><div class="nav-link-content"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div></a></li>
                        <li class="nav-item"><a class="nav-link active" href="sites.html"><div class="nav-link-content"><i class="fas fa-building"></i><span>Sites</span></div></a></li>
                    </ul>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-section-title">MANAGEMENT</div>
                    <ul class="nav nav-pills flex-column">
                        <li class="nav-item"><a class="nav-link" href="tasks.html"><div class="nav-link-content"><i class="fas fa-tasks"></i><span>Tasks</span></div></a></li>
                        <li class="nav-item"><a class="nav-link" href="users.html"><div class="nav-link-content"><i class="fas fa-hard-hat"></i><span>User</span></div></a></li>
                        <li class="nav-item"><a class="nav-link" href="#"><div class="nav-link-content"><i class="fas fa-wallet"></i><span>Petty Cash</span></div></a></li>
                        <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="collapse" data-bs-target="#material-menu"><div class="nav-link-content"><i class="fas fa-cubes"></i><span>Material</span></div><i class="fas fa-chevron-down dropdown-arrow"></i></a><div class="collapse" id="material-menu"><ul class="nav nav-pills flex-column ms-3"></ul></div></li>
                        <li class="nav-item"><a class="nav-link" href="#"><div class="nav-link-content"><i class="fas fa-file-alt"></i><span>Reports</span></div></a></li>
                        <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="collapse" data-bs-target="#master-menu"><div class="nav-link-content"><i class="fas fa-tools"></i><span>Master</span></div><i class="fas fa-chevron-down dropdown-arrow"></i></a><div class="collapse" id="master-menu"><ul class="nav nav-pills flex-column ms-3"></ul></div></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container-fluid">
            <!-- Page Header -->
            <div class="page-header d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h2 mb-1 text-primary"><i class="fas fa-plus-circle me-2"></i>Create New Site</h1>
                    <p class="text-muted mb-0">Fill out the details below to create a new project site.</p>
                </div>
            </div>

            <!-- Create Site Form -->
            <div class="card">
                <div class="card-body p-4">
                    <form id="create-site-form">
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label for="site-name" class="form-label">Site Name</label>
                                <input type="text" class="form-control" id="site-name" placeholder="e.g., Downtown Residential Tower" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="client-name" class="form-label">Client Name</label>
                                <input type="text" class="form-control" id="client-name" placeholder="e.g., John Doe" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="architect-name" class="form-label">Architect Name</label>
                                <input type="text" class="form-control" id="architect-name" placeholder="e.g., Jane Smith Architecture" required>
                            </div>
                        </div>
                        <div class="row">
                             <div class="col-md-6 mb-3">
                                <label for="start-date" class="form-label">Start Date</label>
                                <input type="date" class="form-control" id="start-date" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="end-date" class="form-label">End Date</label>
                                <input type="date" class="form-control" id="end-date" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="site-photos" class="form-label">Site Photos</label>
                            <input class="form-control" type="file" id="site-photos" multiple accept="image/*">
                            <div id="photo-preview-container" class="mt-3"></div>
                        </div>
                        <hr class="my-4">
                        <div class="d-flex justify-content-end">
                            <button type="button" class="btn btn-secondary me-2">Cancel</button>
                            <button type="submit" class="btn btn-primary">Create Site</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/create-site.js"></script>
</body>
</html>
